<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>WMS Sistema</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 400px;
        }
        input, button {
            padding: 10px;
            margin-top: 10px;
            width: 100%;
        }
        button {
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #218838;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>Entrada de Produto</h1>

        <input type="text" placeholder="Nome do Produto">
        <input type="number" placeholder="Quantidade">
        <input type="text" placeholder="Endereço">

        <button>Salvar</button>
    </div>

</body>
</html>
